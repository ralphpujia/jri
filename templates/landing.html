{% extends "base.html" %}

{% block title %}Just Ralph It{% endblock %}

{% block head %}
<style>
    .landing-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        max-width: 600px;
        margin: 0 auto;
        padding: 1rem;
        text-align: center;
    }
    .landing-container h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }
    .landing-container p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 2rem;
        color: #e0e0e0;
    }
    .btn-github {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: 1px solid #e0e0e0;
        background: transparent;
        color: #fff;
        font-size: 1rem;
        text-decoration: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .btn-github:hover {
        background-color: rgba(255, 255, 255, 0.1);
    }
</style>
{% endblock %}

{% block content %}
<div class="landing-container">
    <h1>Just Ralph It</h1>
    <p>Tool to transform your software idea into a very detailed plan and let an AI agent build it entirely.</p>
    <a href="/auth/login" class="btn-github">Sign in with GitHub</a>
</div>
{% endblock %}
