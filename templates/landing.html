{% extends "base.html" %}

{% block title %}JUSTRALPH.IT{% endblock %}

{% block body_attrs %} class="landing"{% endblock %}

{% block head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/landing.css">
{% endblock %}

{% block content %}
<div id="bouncing-logo-container" class="landing-fullscreen landing-grid-bg landing-scanline">
    <!-- Bouncing Logo -->
    <img id="bouncing-logo"
         src="/static/img/ralph-logo.png"
         alt=""
         aria-hidden="true"
         class="bouncing-logo"
         width="720">

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">&#9790;</button>

    <!-- Central Card -->
    <div class="landing-card">
        <span class="red-accent" aria-hidden="true"></span>

        <!-- Title Section -->
        <div class="title-section">
            <div class="bracket-wrapper">
                <span class="bracket-corner bracket-tl" aria-hidden="true"></span>
                <span class="bracket-corner bracket-tr" aria-hidden="true"></span>
                <span class="bracket-corner bracket-bl" aria-hidden="true"></span>
                <span class="bracket-corner bracket-br" aria-hidden="true"></span>
                <h1 class="landing-title glitch-text terminal-glow">JUSTRALPH.IT</h1>
            </div>
            <p class="landing-subtitle">FROM IDEA TO CODE</p>
            <p class="landing-tagline">DESCRIBE YOUR PROJECT. RALPH BUILDS IT.</p>
        </div>

        <!-- Actions -->
        <div class="landing-actions">
            <a href="/auth/login" class="btn-login">LOGIN WITH GITHUB</a>
        </div>
    </div>
</div>

<script src="/static/js/landing.js"></script>
{% endblock %}
