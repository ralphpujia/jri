{% extends "base.html" %}

{% block title %}New Project | Just Ralph It{% endblock %}

{% block head %}
<style>
    nav {
        padding: 0.7rem 1.5rem;
        border-bottom: 1px solid var(--border-light);
        min-height: 48px;
        display: flex;
        align-items: center;
    }
    nav a {
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
    }
    nav a:hover {
        color: var(--text-bright);
    }
    .new-project-container {
        max-width: 500px;
        margin: 4rem auto;
        padding: 0 1rem;
    }
    .new-project-container h2 {
        font-size: 1.8rem;
        margin-bottom: 2rem;
    }
    .form-group {
        margin-bottom: 1.5rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
        color: var(--text-muted);
    }
    .form-group input[type="text"],
    .form-group textarea {
        width: 100%;
        padding: 0.65rem 0.75rem;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-size: 1rem;
        font-family: inherit;
    }
    .form-group input[type="text"]:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--border-focus);
    }
    .form-group textarea {
        resize: vertical;
    }
    .field-error {
        color: #ff4444;
        font-size: 0.85rem;
        margin-top: 0.4rem;
        display: none;
    }
    .form-actions {
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    .btn-submit {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: 1px solid var(--text);
        background: transparent;
        color: var(--text-bright);
        font-size: 1rem;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .btn-submit:hover {
        background-color: var(--hover-bg);
    }
    .btn-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    .btn-cancel {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 0.95rem;
    }
    .btn-cancel:hover {
        color: var(--text-bright);
    }
</style>
{% endblock %}

{% block content %}
<nav>
    <a href="/dashboard">Just Ralph It</a>
</nav>
<div class="new-project-container">
    <h2>New Project</h2>
    <form id="new-project-form">
        <div class="form-group">
            <label for="name">Project Name</label>
            <input type="text" id="name" name="name" required>
            <div class="field-error" id="name-error"></div>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="What do you want to build?" rows="4"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-submit" id="submit-btn">Create Project</button>
            <a href="/dashboard" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
<script>
(function() {
    const form = document.getElementById('new-project-form');
    const nameInput = document.getElementById('name');
    const descInput = document.getElementById('description');
    const nameError = document.getElementById('name-error');
    const submitBtn = document.getElementById('submit-btn');
    const NAME_RE = /^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$/;

    function showError(msg) {
        nameError.textContent = msg;
        nameError.style.display = 'block';
    }

    function hideError() {
        nameError.style.display = 'none';
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideError();

        const name = nameInput.value.trim();
        const description = descInput.value.trim();

        if (!NAME_RE.test(name)) {
            showError('Name must contain only letters, numbers, and hyphens, and start/end with a letter or number.');
            return;
        }

        submitBtn.textContent = 'Creating...';
        submitBtn.disabled = true;
        nameInput.disabled = true;
        descInput.disabled = true;

        try {
            const res = await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });

            if (res.ok) {
                window.location.href = '/project/' + encodeURIComponent(name);
                return;
            }

            try {
                const data = await res.json();
                showError(data.detail || 'Something went wrong. Please try again.');
            } catch (_) {
                showError('Something went wrong. Please try again.');
            }
        } catch (err) {
            showError('Something went wrong. Please try again.');
        }

        submitBtn.textContent = 'Create Project';
        submitBtn.disabled = false;
        nameInput.disabled = false;
        descInput.disabled = false;
    });
})();
</script>
{% endblock %}
