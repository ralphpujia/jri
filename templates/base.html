<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Just Ralph It{% endblock %}</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111;
            --text: #e0e0e0;
            --text-bright: #fff;
            --text-muted: #ccc;
            --text-dim: #888;
            --text-dimmer: #999;
            --text-faint: #666;
            --card-bg: #1a1a1a;
            --border: #333;
            --border-light: #222;
            --border-focus: #555;
            --input-bg: #1a1a1a;
            --code-bg: #0a0a0a;
            --hover-bg: rgba(255, 255, 255, 0.1);
            --scrollbar-thumb: #333;
            --scrollbar-thumb-hover: #555;
            --tab-bar-bg: #0f0f0f;
            --badge-bg: #222;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #fafafa;
                --bg-secondary: #f0f0f0;
                --text: #1a1a1a;
                --text-bright: #000;
                --text-muted: #444;
                --text-dim: #666;
                --text-dimmer: #777;
                --text-faint: #999;
                --card-bg: #ffffff;
                --border: #ddd;
                --border-light: #e5e5e5;
                --border-focus: #aaa;
                --input-bg: #f5f5f5;
                --code-bg: #f0f0f0;
                --hover-bg: rgba(0, 0, 0, 0.05);
                --scrollbar-thumb: #ccc;
                --scrollbar-thumb-hover: #aaa;
                --tab-bar-bg: #f5f5f5;
                --badge-bg: #e5e5e5;
            }
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
