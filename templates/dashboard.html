{% extends "base.html" %}

{% block title %}Dashboard | Just Ralph It{% endblock %}

{% block head %}
<style>
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.7rem 1.5rem;
        border-bottom: 1px solid var(--border-light);
        min-height: 48px;
    }
    a.gh-link {
        color: var(--text-muted);
        text-decoration: none;
        padding: 2px 8px;
        display: inline-flex;
        align-items: center;
    }
    nav a.brand {
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        font-size: 1.05rem;
    }
    nav a.brand:hover {
        color: var(--text-bright);
    }
    .nav-right {
        display: flex;
        align-items: center;
        gap: 0.8rem;
    }
    .nav-right img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
    }
    .nav-right .username {
        color: var(--text-muted);
        font-size: 0.9rem;
    }
    .nav-right a {
        color: var(--text-dimmer);
        text-decoration: none;
        font-size: 0.85rem;
    }
    .nav-right a:hover {
        color: var(--text-bright);
    }
    .container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
    }
    .header-row h2 {
        font-size: 1.8rem;
    }
    .btn {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border: 1px solid var(--text);
        background: transparent;
        color: var(--text-bright);
        font-size: 0.95rem;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        transition: background-color 0.2s;
    }
    .btn:hover {
        background-color: var(--hover-bg);
    }
    .project-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .project-card {
        background: var(--card-bg);
        border: 1px solid var(--border-light);
        border-radius: 6px;
        padding: 1.2rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .project-info {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
    }
    .project-info a.project-name {
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
    }
    .project-info a.project-name:hover {
        color: var(--text-bright);
    }
    .project-meta {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.85rem;
        color: var(--text-dim);
    }
    .project-meta a {
        color: var(--text-dim);
        text-decoration: none;
    }
    .project-meta a:hover {
        color: var(--text-muted);
    }
    .project-actions {
        display: flex;
        align-items: center;
    }
    .btn-delete {
        background: none;
        border: none;
        color: #ff4444;
        cursor: pointer;
        font-size: 0.9rem;
        padding: 0.3rem 0.6rem;
    }
    .btn-delete:hover {
        color: #ff6666;
    }
    .empty-state {
        text-align: center;
        margin-top: 4rem;
        color: var(--text-dim);
    }
    .empty-state p {
        margin-bottom: 1.5rem;
        font-size: 1.1rem;
    }
    #loading-text {
        text-align: center;
        color: var(--text-dim);
        padding: 3rem 0;
        font-size: 1.1rem;
    }
</style>
{% endblock %}

{% block content %}
<nav>
    <a href="/dashboard" class="brand">Just Ralph It</a>
    <div class="nav-right">
        <img src="{{ user.github_avatar_url }}" alt="Avatar">
        <span class="username">{{ user.github_username }}</span>
        <a href="/auth/logout">Logout</a>
    </div>
</nav>
<div class="container">
    <div class="header-row">
        <h2>Your Projects</h2>
        <a href="/new" class="btn">New Project</a>
    </div>
    <div id="project-list" class="project-list">
        <div id="loading-text">Loading…</div>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">
        <p>No projects yet.</p>
    </div>
</div>
<script>
(function() {
    var listEl = document.getElementById('project-list');
    var emptyEl = document.getElementById('empty-state');

    function renderProjects(projects) {
        var loadingEl = document.getElementById('loading-text');
        if (loadingEl) loadingEl.style.display = 'none';
        listEl.innerHTML = '';
        if (projects.length === 0) {
            emptyEl.style.display = 'block';
            return;
        }
        emptyEl.style.display = 'none';
        projects.forEach(function(p) {
            var card = document.createElement('div');
            card.className = 'project-card';
            card.dataset.name = p.name;

            var info = document.createElement('div');
            info.className = 'project-info';

            var nameLink = document.createElement('a');
            nameLink.className = 'project-name';
            nameLink.href = '/project/' + encodeURIComponent(p.name);
            nameLink.textContent = p.name;
            info.appendChild(nameLink);

            var meta = document.createElement('div');
            meta.className = 'project-meta';
            var issueCount = document.createElement('span');
            issueCount.textContent = (p.issue_count || 0) + ' issues';
            meta.appendChild(issueCount);

            if (p.github_repo_url) {
                var ghLink = document.createElement('a');
                ghLink.href = p.github_repo_url;
                ghLink.target = '_blank';
                ghLink.rel = 'noopener noreferrer';
                ghLink.className = 'gh-link';
                ghLink.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Open';
                meta.appendChild(ghLink);
            }
            info.appendChild(meta);

            var actions = document.createElement('div');
            actions.className = 'project-actions';
            var delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = 'Delete';
            delBtn.addEventListener('click', function() {
                if (!confirm('Delete project "' + p.name + '"? This will also delete the GitHub repo.')) return;
                fetch('/api/projects/' + encodeURIComponent(p.name) + '?delete_repo=true', { method: 'DELETE' })
                    .then(function(res) {
                        if (res.ok) {
                            card.remove();
                            if (listEl.children.length === 0) {
                                emptyEl.style.display = 'block';
                            }
                        }
                    });
            });
            actions.appendChild(delBtn);

            card.appendChild(info);
            card.appendChild(actions);
            card.style.cursor = 'pointer';
            card.addEventListener('click', function(e) {
                // Don't navigate if clicking the delete button
                if (e.target.closest('.btn-delete')) return;
                if (e.target.closest('.gh-link')) return;
                window.location.href = '/project/' + encodeURIComponent(p.name);
            });
            listEl.appendChild(card);
        });
    }

    fetch('/api/projects')
        .then(function(res) { return res.json(); })
        .then(function(data) { renderProjects(data); })
        .catch(function() { renderProjects([]); });
})();
</script>
{% endblock %}
